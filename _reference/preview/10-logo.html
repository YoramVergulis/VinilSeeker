<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card ltr"><div class="label" style="margin-bottom:18px;direction:rtl">Logo & brand mark</div>

<!-- Primary horizontal lockup -->
<div style="display:flex;align-items:center;gap:18px;padding:22px 24px;background:var(--cream);border:1px solid var(--rule);border-radius:12px">
  <!-- Vinyl mark -->
  <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <circle cx="32" cy="32" r="31" fill="#0F0814"/>
    <circle cx="32" cy="32" r="31" fill="none" stroke="#3B1F5C" stroke-width="0.5" opacity="0.6"/>
    <circle cx="32" cy="32" r="26" fill="none" stroke="#2A1542" stroke-width="0.5"/>
    <circle cx="32" cy="32" r="22" fill="none" stroke="#2A1542" stroke-width="0.5"/>
    <circle cx="32" cy="32" r="18" fill="none" stroke="#2A1542" stroke-width="0.5"/>
    <circle cx="32" cy="32" r="13" fill="#3B1F5C"/>
    <circle cx="32" cy="32" r="13" fill="none" stroke="#5A3997" stroke-width="0.5"/>
    <circle cx="32" cy="32" r="2.5" fill="#D9A441"/>
    <circle cx="32" cy="32" r="0.8" fill="#0F0814"/>
  </svg>
  <div>
    <div style="font-family:var(--font-display);font-weight:700;font-size:36px;line-height:1;color:var(--purple-900);letter-spacing:-0.02em">VinilSeeker</div>
    <div style="font-family:var(--font-body);font-weight:600;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-700);margin-top:4px">find · the · groove</div>
  </div>
</div>

<!-- Variants -->
<div style="display:flex;gap:14px;margin-top:18px">
  <!-- on cream -->
  <div style="flex:1;padding:18px;background:var(--cream);border:1px solid var(--rule);border-radius:12px;text-align:center">
    <svg width="36" height="36" viewBox="0 0 64 64" style="display:inline-block;vertical-align:middle"><circle cx="32" cy="32" r="31" fill="#0F0814"/><circle cx="32" cy="32" r="13" fill="#3B1F5C"/><circle cx="32" cy="32" r="2.5" fill="#D9A441"/></svg>
    <span style="font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--purple-900);vertical-align:middle;margin-left:8px">VinilSeeker</span>
    <div class="token" style="margin-top:8px;direction:rtl">primary · cream</div>
  </div>
  <!-- on purple -->
  <div style="flex:1;padding:18px;background:var(--purple-700);border-radius:12px;text-align:center">
    <svg width="36" height="36" viewBox="0 0 64 64" style="display:inline-block;vertical-align:middle"><circle cx="32" cy="32" r="31" fill="#0F0814"/><circle cx="32" cy="32" r="13" fill="#5A3997"/><circle cx="32" cy="32" r="2.5" fill="#D9A441"/></svg>
    <span style="font-family:var(--font-display);font-weight:700;font-size:22px;color:#FAF6EE;vertical-align:middle;margin-left:8px">VinilSeeker</span>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--purple-200);margin-top:8px;direction:rtl">reverse · purple</div>
  </div>
  <!-- mark only -->
  <div style="flex:0.6;padding:18px;background:var(--vinyl-black);border-radius:12px;text-align:center">
    <svg width="48" height="48" viewBox="0 0 64 64"><circle cx="32" cy="32" r="31" fill="#0F0814" stroke="#3B1F5C" stroke-width="1"/><circle cx="32" cy="32" r="22" fill="none" stroke="#2A1542" stroke-width="0.5"/><circle cx="32" cy="32" r="13" fill="#3B1F5C"/><circle cx="32" cy="32" r="2.5" fill="#D9A441"/></svg>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--purple-200);margin-top:8px;direction:rtl">mark · favicon</div>
  </div>
</div>

<!-- Hebrew lockup -->
<div style="margin-top:14px;padding:16px 22px;background:var(--paper);border:1px solid var(--rule);border-radius:12px;display:flex;align-items:center;gap:14px;direction:rtl">
  <svg width="40" height="40" viewBox="0 0 64 64"><circle cx="32" cy="32" r="31" fill="#0F0814"/><circle cx="32" cy="32" r="13" fill="#3B1F5C"/><circle cx="32" cy="32" r="2.5" fill="#D9A441"/></svg>
  <div style="font-family:var(--font-display);font-weight:700;font-size:30px;color:var(--purple-900);line-height:1">ויניל סיקר</div>
  <div style="margin-right:auto;font-family:var(--font-mono);font-size:11px;color:var(--ink-3)">hebrew lockup</div>
</div>

</div></body></html>
