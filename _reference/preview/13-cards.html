<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card"><div class="label" style="margin-bottom:14px">Vinyl Listing Card</div>

<div style="display:flex;gap:14px">
  <!-- Card 1: standard -->
  <div style="flex:1;background:var(--paper);border:1px solid var(--rule);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm)">
    <div style="height:160px;background:linear-gradient(135deg,#3B1F5C,#0F0814);position:relative;display:flex;align-items:center;justify-content:center">
      <div style="position:relative;width:120px;height:120px"><div style="position:absolute;inset:0;background:#0F0814;border-radius:50%;box-shadow:var(--shadow-vinyl)"></div><div style="position:absolute;inset:36%;background:#D9A441;border-radius:50%"></div><div style="position:absolute;inset:46%;background:#0F0814;border-radius:50%"></div></div>
      <span style="position:absolute;top:10px;right:10px;background:var(--gold-500);color:var(--purple-900);font-size:11px;font-weight:700;padding:3px 10px;border-radius:9999px;letter-spacing:.04em">★ נדיר</span>
    </div>
    <div style="padding:14px">
      <div style="font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--ink);line-height:1.2">The Wall</div>
      <div style="font-size:13px;color:var(--ink-2);margin-top:2px">Pink Floyd · 1979</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:12px">
        <div style="font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--purple-900)">₪320</div>
        <div style="font-size:12px;color:var(--ink-3)">תל אביב</div>
      </div>
    </div>
  </div>

  <!-- Card 2: hovered -->
  <div style="flex:1;background:var(--paper);border:1px solid var(--purple-300);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-md);transform:translateY(-2px)">
    <div style="height:160px;background:linear-gradient(135deg,#5A3997,#2A1542);position:relative;display:flex;align-items:center;justify-content:center">
      <div style="position:relative;width:120px;height:120px"><div style="position:absolute;inset:0;background:#0F0814;border-radius:50%;box-shadow:var(--shadow-vinyl)"></div><div style="position:absolute;inset:36%;background:#7A2540;border-radius:50%"></div><div style="position:absolute;inset:46%;background:#0F0814;border-radius:50%"></div></div>
      <span style="position:absolute;top:10px;left:10px;background:var(--purple-900);color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:9999px">♥ נשמר</span>
    </div>
    <div style="padding:14px">
      <div style="font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--ink);line-height:1.2">Kind of Blue</div>
      <div style="font-size:13px;color:var(--ink-2);margin-top:2px">Miles Davis · 1959</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:12px">
        <div><div style="font-size:11px;color:var(--ink-3);text-decoration:line-through">₪520</div><div style="font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--purple-900)">₪440</div></div>
        <div style="font-size:12px;color:var(--ink-3)">חיפה</div>
      </div>
    </div>
  </div>

  <!-- Card 3: out of stock -->
  <div style="flex:1;background:var(--paper);border:1px solid var(--rule);border-radius:12px;overflow:hidden;opacity:.7;box-shadow:var(--shadow-sm)">
    <div style="height:160px;background:linear-gradient(135deg,#7A6E8A,#4A3D5C);position:relative;display:flex;align-items:center;justify-content:center;filter:grayscale(.6)">
      <div style="position:relative;width:120px;height:120px"><div style="position:absolute;inset:0;background:#0F0814;border-radius:50%"></div><div style="position:absolute;inset:36%;background:#7A6E8A;border-radius:50%"></div></div>
      <span style="position:absolute;top:10px;right:10px;background:var(--ink);color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:9999px">נמכר</span>
    </div>
    <div style="padding:14px">
      <div style="font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--ink);line-height:1.2">Abbey Road</div>
      <div style="font-size:13px;color:var(--ink-2);margin-top:2px">The Beatles · 1969</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:12px">
        <div style="font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--ink-3);text-decoration:line-through">₪280</div>
        <div style="font-size:12px;color:var(--ink-3)">י-ם</div>
      </div>
    </div>
  </div>
</div>

</div></body></html>
