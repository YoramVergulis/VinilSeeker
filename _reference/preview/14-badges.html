<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-body);font-weight:600;font-size:12px;padding:4px 10px;border-radius:9999px;letter-spacing:.02em}
.badge.solid-purple{background:var(--purple-700);color:#fff}
.badge.solid-gold{background:var(--gold-500);color:var(--purple-900)}
.badge.solid-vinyl{background:var(--vinyl-black);color:#fff}
.badge.outline{background:transparent;border:1.5px solid var(--purple-700);color:var(--purple-700)}
.badge.soft-purple{background:var(--purple-100);color:var(--purple-700)}
.badge.soft-success{background:var(--success-bg);color:var(--success)}
.badge.soft-warning{background:var(--warning-bg);color:var(--warning)}
.badge.soft-danger{background:var(--danger-bg);color:var(--danger)}
.badge.soft-burgundy{background:#F2D8DF;color:var(--burgundy)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}
</style></head>
<body><div class="card"><div class="label" style="margin-bottom:14px">Badges & Status Pills</div>

<div class="label" style="font-size:10px;color:var(--ink-3);margin:6px 0">CATEGORY · vinyl-themed</div>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
  <span class="badge solid-purple">★ נדיר</span>
  <span class="badge solid-gold">★ פיק נבחר</span>
  <span class="badge solid-vinyl">⟲ ויניטג'</span>
  <span class="badge soft-burgundy">פרסום מוגבל</span>
  <span class="badge outline">מצב מצוין</span>
  <span class="badge soft-purple">החזרה זמינה</span>
</div>

<div class="label" style="font-size:10px;color:var(--ink-3);margin:6px 0">STATE · semantic</div>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
  <span class="badge soft-success"><span class="dot"></span>זמין</span>
  <span class="badge soft-warning"><span class="dot"></span>ממתין לאישור</span>
  <span class="badge soft-danger"><span class="dot"></span>נדחה</span>
  <span class="badge solid-vinyl">נמכר</span>
</div>

<div class="label" style="font-size:10px;color:var(--ink-3);margin:6px 0">GENRE · pills</div>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
  <span class="badge soft-purple">רוק</span>
  <span class="badge soft-purple">ג'אז</span>
  <span class="badge soft-purple">קלאסי</span>
  <span class="badge soft-purple">ישראלי</span>
  <span class="badge soft-purple">פאנק</span>
  <span class="badge soft-purple">בלוז</span>
  <span class="badge soft-purple">סול</span>
</div>

<div class="label" style="font-size:10px;color:var(--ink-3);margin:6px 0">RATING · seller</div>
<div style="display:flex;gap:8px;flex-wrap:wrap">
  <span class="badge solid-gold">★ 4.8 · 124 ביקורות</span>
  <span class="badge outline">מוכר מאומת ✓</span>
  <span class="badge soft-purple">חבר מ-2023</span>
</div>

</div></body></html>
