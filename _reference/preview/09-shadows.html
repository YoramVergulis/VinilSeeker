<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card"><div class="label" style="margin-bottom:18px">Elevation — purple-tinted shadows</div>
<div style="display:flex;gap:18px;justify-content:space-between;flex-wrap:wrap">
  <div style="text-align:center"><div style="width:100px;height:80px;background:var(--paper);border-radius:12px;box-shadow:var(--shadow-xs)"></div><div class="token" style="margin-top:10px">xs</div></div>
  <div style="text-align:center"><div style="width:100px;height:80px;background:var(--paper);border-radius:12px;box-shadow:var(--shadow-sm)"></div><div class="token" style="margin-top:10px">sm · cards</div></div>
  <div style="text-align:center"><div style="width:100px;height:80px;background:var(--paper);border-radius:12px;box-shadow:var(--shadow-md)"></div><div class="token" style="margin-top:10px">md · hover</div></div>
  <div style="text-align:center"><div style="width:100px;height:80px;background:var(--paper);border-radius:12px;box-shadow:var(--shadow-lg)"></div><div class="token" style="margin-top:10px">lg · modal</div></div>
  <div style="text-align:center"><div style="width:100px;height:80px;background:var(--paper);border-radius:12px;box-shadow:var(--shadow-xl)"></div><div class="token" style="margin-top:10px">xl · sheet</div></div>
  <div style="text-align:center"><div style="width:100px;height:80px;background:var(--vinyl-black);border-radius:50%;box-shadow:var(--shadow-vinyl);position:relative"><div style="position:absolute;inset:32%;border-radius:50%;background:var(--gold-500)"></div><div style="position:absolute;inset:46%;border-radius:50%;background:var(--vinyl-black)"></div></div><div class="token" style="margin-top:10px">vinyl</div></div>
</div>
<div style="margin-top:18px;font-style:italic;font-size:13px;color:var(--ink-3)">All shadows tinted with rgba(26, 12, 43, x) — keeps elevation in the brand instead of going neutral gray.</div>
</div></body></html>
