<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card"><div class="label" style="margin-bottom:14px">Border Radius</div>
<div style="display:flex;gap:14px;align-items:flex-end">
  <div style="text-align:center"><div style="width:80px;height:80px;background:var(--purple-700);border-radius:0"></div><div class="token" style="margin-top:8px">--r-none</div><div style="font-size:11px;color:var(--ink-2)">0px</div></div>
  <div style="text-align:center"><div style="width:80px;height:80px;background:var(--purple-700);border-radius:4px"></div><div class="token" style="margin-top:8px">--r-xs</div><div style="font-size:11px;color:var(--ink-2)">4px</div></div>
  <div style="text-align:center"><div style="width:80px;height:80px;background:var(--purple-700);border-radius:8px"></div><div class="token" style="margin-top:8px">--r-sm</div><div style="font-size:11px;color:var(--ink-2)">8px</div></div>
  <div style="text-align:center"><div style="width:80px;height:80px;background:var(--purple-700);border-radius:12px;outline:2px dashed var(--gold-500);outline-offset:3px"></div><div class="token" style="margin-top:8px">--r-md ★</div><div style="font-size:11px;color:var(--ink-2)">12px default</div></div>
  <div style="text-align:center"><div style="width:80px;height:80px;background:var(--purple-700);border-radius:16px"></div><div class="token" style="margin-top:8px">--r-lg</div><div style="font-size:11px;color:var(--ink-2)">16px</div></div>
  <div style="text-align:center"><div style="width:80px;height:80px;background:var(--purple-700);border-radius:24px"></div><div class="token" style="margin-top:8px">--r-xl</div><div style="font-size:11px;color:var(--ink-2)">24px</div></div>
  <div style="text-align:center"><div style="width:80px;height:80px;background:var(--purple-700);border-radius:9999px"></div><div class="token" style="margin-top:8px">--r-full</div><div style="font-size:11px;color:var(--ink-2)">pill / disc</div></div>
</div>
<div style="margin-top:14px;font-style:italic;font-size:13px;color:var(--ink-3)">Default: 12px (md) for cards & inputs · 9999px (full) for vinyl discs, badges, avatars · 8px (sm) for nested tags.</div>
</div></body></html>
