<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card"><div class="label" style="margin-bottom:14px">Accents — gold (45rpm) & burgundy</div>
<div class="row" style="gap:10px">
  <div style="flex:1"><div style="background:var(--gold-300);height:80px;border-radius:8px"></div><div style="padding-top:6px"><div style="font-size:12px;font-weight:700">Gold 300</div><div class="token">#E8C076</div></div></div>
  <div style="flex:1.3;position:relative"><div style="background:var(--gold-500);height:80px;border-radius:8px;display:flex;align-items:center;justify-content:center"><div style="width:36px;height:36px;border-radius:50%;background:var(--vinyl-black);position:relative"><div style="position:absolute;inset:14px;border-radius:50%;background:var(--gold-500)"></div></div></div><div style="padding-top:6px"><div style="font-size:12px;font-weight:700;color:var(--gold-700)">Gold 500 ★ price/CTA</div><div class="token">#D9A441</div></div></div>
  <div style="flex:1"><div style="background:var(--gold-700);height:80px;border-radius:8px"></div><div style="padding-top:6px"><div style="font-size:12px;font-weight:700">Gold 700</div><div class="token">#A67622</div></div></div>
  <div style="flex:1"><div style="background:var(--burgundy);height:80px;border-radius:8px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">VINTAGE</div><div style="padding-top:6px"><div style="font-size:12px;font-weight:700">Burgundy</div><div class="token">#7A2540</div></div></div>
</div>
<div class="label" style="margin:20px 0 10px">Semantic states</div>
<div class="row" style="gap:8px">
  <div style="flex:1;background:var(--success-bg);border:1px solid var(--success);border-radius:8px;padding:10px"><div style="display:flex;align-items:center;gap:6px;color:var(--success);font-weight:700;font-size:13px">● זמין</div><div class="token" style="margin-top:4px">success #2E7D5B</div></div>
  <div style="flex:1;background:var(--warning-bg);border:1px solid var(--warning);border-radius:8px;padding:10px"><div style="display:flex;align-items:center;gap:6px;color:var(--warning);font-weight:700;font-size:13px">● ממתין</div><div class="token" style="margin-top:4px">warning #B8801A</div></div>
  <div style="flex:1;background:var(--danger-bg);border:1px solid var(--danger);border-radius:8px;padding:10px"><div style="display:flex;align-items:center;gap:6px;color:var(--danger);font-weight:700;font-size:13px">● שגיאה</div><div class="token" style="margin-top:4px">danger #A8324A</div></div>
  <div style="flex:1;background:var(--info-bg);border:1px solid var(--info);border-radius:8px;padding:10px"><div style="display:flex;align-items:center;gap:6px;color:var(--info);font-weight:700;font-size:13px">● מידע</div><div class="token" style="margin-top:4px">info #2D5A8A</div></div>
</div>
</div></body></html>
