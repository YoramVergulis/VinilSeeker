<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card"><div class="label" style="margin-bottom:14px">Neutrals — paper, ink & vinyl</div>
<div class="row" style="gap:8px">
  <div style="flex:1"><div style="background:var(--white);height:80px;border-radius:8px;border:1px solid var(--rule)"></div><div style="padding-top:8px"><div style="font-size:12px;font-weight:700">White</div><div class="token">#FFFFFF</div></div></div>
  <div style="flex:1"><div style="background:var(--paper);height:80px;border-radius:8px;border:1px solid var(--rule)"></div><div style="padding-top:8px"><div style="font-size:12px;font-weight:700">Paper</div><div class="token">#FAF6EE</div></div></div>
  <div style="flex:1"><div style="background:var(--cream);height:80px;border-radius:8px;border:1px solid var(--rule)"></div><div style="padding-top:8px"><div style="font-size:12px;font-weight:700">Cream ★</div><div class="token">#F5EFE6</div></div></div>
  <div style="flex:1"><div style="background:var(--cream-deep);height:80px;border-radius:8px;border:1px solid var(--rule)"></div><div style="padding-top:8px"><div style="font-size:12px;font-weight:700">Cream Deep</div><div class="token">#ECE3D2</div></div></div>
  <div style="flex:1"><div style="background:var(--rule);height:80px;border-radius:8px"></div><div style="padding-top:8px"><div style="font-size:12px;font-weight:700">Rule</div><div class="token">#D9D2C4</div></div></div>
</div>
<div class="row" style="gap:8px;margin-top:16px">
  <div style="flex:1"><div style="background:var(--ink-3);height:80px;border-radius:8px"></div><div style="padding-top:8px"><div style="font-size:12px;font-weight:700">Ink 3 (muted)</div><div class="token">#7A6E8A</div></div></div>
  <div style="flex:1"><div style="background:var(--ink-2);height:80px;border-radius:8px"></div><div style="padding-top:8px"><div style="font-size:12px;font-weight:700">Ink 2 (sub)</div><div class="token">#4A3D5C</div></div></div>
  <div style="flex:1"><div style="background:var(--ink);height:80px;border-radius:8px"></div><div style="padding-top:8px"><div style="font-size:12px;font-weight:700">Ink (text)</div><div class="token">#1A1126</div></div></div>
  <div style="flex:1.4;position:relative"><div style="background:var(--vinyl-black);height:80px;border-radius:8px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:.08em">⟲ VINYL ⟳</div><div style="padding-top:8px"><div style="font-size:12px;font-weight:700">Vinyl Black ★</div><div class="token">#0F0814</div></div></div>
</div>
</div></body></html>
