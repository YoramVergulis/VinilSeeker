<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VinylSeeker — Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; font-family: 'Caveat', cursive; color: #222; }

  /* Screen nav tabs */
  .screen-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: #111; border-bottom: 2px solid #333;
    display: flex; gap: 0; overflow-x: auto; padding: 0 12px;
  }
  .screen-nav button {
    font-family: 'Caveat', cursive; font-size: 15px; font-weight: 600;
    color: #888; background: none; border: none; cursor: pointer;
    padding: 12px 18px; white-space: nowrap; border-bottom: 3px solid transparent;
    transition: all 0.15s;
  }
  .screen-nav button.active { color: #fff; border-bottom-color: #fff; }
  .screen-nav button:hover { color: #ccc; }

  .screens-wrapper { padding-top: 48px; }

  .screen-panel { display: none; padding: 32px; min-height: calc(100vh - 48px); }
  .screen-panel.active { display: block; }

  /* Wireframe canvas */
  .wf-canvas {
    background: #f5f3ef;
    border: 2px solid #888;
    border-radius: 4px;
    position: relative;
    font-family: 'Caveat', cursive;
    direction: rtl;
  }

  /* Wireframe primitives */
  .wf-box {
    border: 2px solid #555;
    background: #e8e5df;
    border-radius: 2px;
    position: relative;
  }
  .wf-box.dashed { border-style: dashed; background: #ede9e2; }
  .wf-img {
    border: 2px solid #555;
    background: #ddd;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .wf-img::before, .wf-img::after {
    content: ''; position: absolute;
    background: #aaa; height: 2px;
  }
  .wf-img::before { width: 100%; transform: rotate(var(--deg, 30deg)); }
  .wf-img::after { width: 100%; transform: rotate(calc(-1 * var(--deg, 30deg))); }

  .wf-line { height: 10px; background: #bbb; border-radius: 2px; }
  .wf-line.sm { height: 8px; }
  .wf-line.lg { height: 14px; }

  .wf-btn {
    border: 2px solid #444;
    background: #e0ddd7;
    border-radius: 2px;
    padding: 6px 14px;
    font-family: 'Caveat', cursive;
    font-size: 15px;
    font-weight: 700;
    color: #222;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: default;
  }
  .wf-btn.filled { background: #444; color: #f5f3ef; }
  .wf-btn.ghost { background: transparent; border-style: dashed; }
  .wf-btn.outline { background: transparent; }
  .wf-btn.wide { width: 100%; }

  .wf-input {
    border: 2px solid #555;
    background: #fff;
    border-radius: 2px;
    padding: 7px 10px;
    font-family: 'Caveat', cursive;
    font-size: 14px;
    color: #888;
    width: 100%;
  }
  .wf-input.error { border-color: #333; border-style: dashed; }

  .wf-label { font-size: 13px; font-weight: 700; color: #444; margin-bottom: 3px; display: block; }

  .wf-pill {
    display: inline-flex; align-items: center;
    border: 2px solid #555; border-radius: 20px;
    padding: 2px 10px; font-size: 13px; font-weight: 600;
    background: #e8e5df; color: #333;
  }
  .wf-pill.active { background: #444; color: #f5f3ef; }
  .wf-pill.sm { font-size: 11px; padding: 1px 7px; }

  /* Annotation styles */
  .ann {
    font-family: 'Caveat', cursive;
    font-size: 12px;
    color: #666;
    font-style: italic;
    display: flex; align-items: flex-start; gap: 4px;
  }
  .ann-arrow { color: #555; font-style: normal; font-size: 14px; }
  .ann-box {
    border: 1.5px dashed #999;
    border-radius: 3px;
    padding: 4px 8px;
    background: rgba(255,255,255,0.6);
    font-family: 'Caveat', cursive;
    font-size: 12px;
    color: #555;
    font-style: italic;
  }

  /* Auth note */
  .auth-note {
    font-family: 'Caveat', cursive;
    font-size: 12px;
    color: #666;
    background: #f0ede7;
    border: 1.5px dashed #aaa;
    border-radius: 3px;
    padding: 3px 8px;
    font-style: italic;
  }

  /* Error / empty states */
  .state-box {
    border: 2px dashed #888;
    background: #ede9e2;
    border-radius: 4px;
    padding: 16px;
  }
  .state-box.error-state { border-color: #555; background: #e8e5df; }

  /* Section header */
  .wf-section-title {
    font-size: 16px; font-weight: 700; color: #333;
    border-bottom: 2px solid #555; padding-bottom: 4px; margin-bottom: 10px;
  }

  /* Screen title badge */
  .screen-badge {
    display: inline-block;
    background: #333; color: #f5f3ef;
    font-family: 'Caveat', cursive; font-size: 18px; font-weight: 700;
    padding: 6px 16px; border-radius: 2px; margin-bottom: 16px;
  }
  .screen-badge span { opacity: 0.6; font-size: 14px; margin-right: 8px; }

  .access-badge {
    display: inline-block;
    border: 2px solid #888; background: #e8e5df;
    font-family: 'Caveat', cursive; font-size: 13px;
    padding: 2px 10px; border-radius: 2px; margin-bottom: 16px; margin-right: 8px;
    color: #555;
  }

  /* Divider */
  .wf-divider { border: none; border-top: 2px solid #bbb; margin: 8px 0; }

  /* Grid helpers */
  .flex { display: flex; }
  .flex-col { display: flex; flex-direction: column; }
  .gap4 { gap: 4px; } .gap6 { gap: 6px; } .gap8 { gap: 8px; }
  .gap10 { gap: 10px; } .gap12 { gap: 12px; } .gap16 { gap: 16px; }
  .gap20 { gap: 20px; } .gap24 { gap: 24px; }
  .items-center { align-items: center; }
  .items-start { align-items: flex-start; }
  .justify-between { justify-content: space-between; }
  .justify-center { justify-content: center; }
  .flex1 { flex: 1; }
  .w100 { width: 100%; }

  /* Checkbox / Radio */
  .wf-check {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; color: #333;
  }
  .wf-check-box {
    width: 14px; height: 14px; border: 2px solid #555;
    background: #fff; flex-shrink: 0; border-radius: 1px;
    display: flex; align-items: center; justify-content: center;
  }
  .wf-check-box.checked::after { content: '✓'; font-size: 10px; color: #333; }
  .wf-radio-dot {
    width: 14px; height: 14px; border: 2px solid #555;
    background: #fff; flex-shrink: 0; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .wf-radio-dot.checked::after { content: '●'; font-size: 8px; color: #333; }

  /* Circle placeholder */
  .wf-circle {
    border: 2px solid #555; background: #e0ddd7; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #888;
  }

  /* Sticky note style annotations */
  .sticky-note {
    background: #f5f0d8; border: 1.5px solid #ccc;
    font-family: 'Caveat', cursive; font-size: 12px; color: #555;
    padding: 6px 10px; border-radius: 2px;
    transform: rotate(-1deg);
    box-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    font-style: italic;
  }

  /* Rating stars */
  .wf-stars { color: #888; font-size: 14px; letter-spacing: 1px; }

  /* Scrollable area indicator */
  .scroll-hint {
    font-family: 'Caveat', cursive; font-size: 11px; color: #999;
    text-align: center; padding: 4px; border-top: 1px dashed #ccc;
    font-style: italic;
  }

  /* Sketch border on canvas */
  .sketch-border {
    box-shadow: 3px 3px 0 #888, -1px -1px 0 #aaa;
  }

  /* Mobile annotation panel */
  .mobile-ann {
    background: #f0ede7; border: 2px solid #aaa; border-radius: 4px;
    padding: 12px; font-family: 'Caveat', cursive; font-size: 13px; color: #444;
  }
  .mobile-ann-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: #333; }
</style>
</head>
<body>

<nav class="screen-nav" id="screenNav"></nav>

<div class="screens-wrapper" id="screensWrapper"></div>

<script type="text/babel">

// ─── Shared Primitives ───────────────────────────────────────────────────────

const ImgBox = ({ w, h, label, style = {} }) => (
  <div className="wf-img" style={{ width: w, height: h, flexShrink: 0, ...style }}>
    <span style={{ fontSize: 11, color: '#888', zIndex: 1, background: '#ddd', padding: '0 3px', fontFamily: 'Caveat, cursive' }}>{label || '[ img ]'}</span>
  </div>
);

const Line = ({ w = '100%', style = {} }) => (
  <div className="wf-line" style={{ width: w, ...style }} />
);

const Lines = ({ count = 3, style = {} }) => (
  <div className="flex-col gap4" style={style}>
    {Array.from({ length: count }).map((_, i) => (
      <div key={i} className="wf-line" style={{ width: i === count - 1 ? '70%' : '100%' }} />
    ))}
  </div>
);

const Btn = ({ label, type = '', style = {}, ann }) => (
  <div style={{ display: 'inline-flex', flexDirection: 'column', alignItems: 'flex-start', gap: 3 }}>
    <div className={`wf-btn ${type}`} style={style}>{label}</div>
    {ann && <div className="ann" style={{ fontSize: 11 }}><span className="ann-arrow">↳</span>{ann}</div>}
  </div>
);

const Input = ({ label, placeholder = '', error, style = {} }) => (
  <div className="flex-col gap4" style={style}>
    {label && <span className="wf-label">{label}</span>}
    <div className={`wf-input ${error ? 'error' : ''}`} style={{ color: '#aaa' }}>{placeholder || '_ _ _ _ _ _ _ _'}</div>
    {error && <div style={{ fontSize: 11, color: '#555', fontStyle: 'italic', fontFamily: 'Caveat, cursive' }}>⚠ {error}</div>}
  </div>
);

const Ann = ({ text, style = {} }) => (
  <div className="ann" style={style}><span className="ann-arrow">↳</span>{text}</div>
);

const AuthNote = ({ text }) => (
  <div className="auth-note">{text}</div>
);

const Pill = ({ label, active, sm }) => (
  <div className={`wf-pill ${active ? 'active' : ''} ${sm ? 'sm' : ''}`}>{label}</div>
);

const SectionTitle = ({ children }) => (
  <div className="wf-section-title">{children}</div>
);

const Divider = () => <hr className="wf-divider" />;

const Check = ({ label, checked }) => (
  <div className="wf-check">
    <div className={`wf-check-box ${checked ? 'checked' : ''}`}></div>
    <span>{label}</span>
  </div>
);

const Radio = ({ label, checked }) => (
  <div className="wf-check">
    <div className={`wf-radio-dot ${checked ? 'checked' : ''}`}></div>
    <span>{label}</span>
  </div>
);

const Circle = ({ size = 40, label, style = {} }) => (
  <div className="wf-circle" style={{ width: size, height: size, ...style }}>
    {label && <span style={{ fontSize: 12 }}>{label}</span>}
  </div>
);

// Mobile phone frame — used to show how each screen adapts on a small viewport
const MobileFrame = ({ children, label }) => (
  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
    <div style={{
      width: 240,
      height: 470,
      background: '#222',
      borderRadius: 28,
      padding: '8px 6px',
      boxShadow: '3px 3px 0 #888',
      position: 'relative',
    }}>
      {/* Notch */}
      <div style={{
        position: 'absolute', top: 8, left: '50%', transform: 'translateX(-50%)',
        width: 60, height: 14, background: '#222', borderRadius: '0 0 10px 10px', zIndex: 2,
      }}/>
      <div style={{
        width: '100%', height: '100%',
        background: '#f5f3ef',
        borderRadius: 22,
        overflow: 'hidden',
        direction: 'rtl',
        position: 'relative',
        fontFamily: 'Caveat, cursive',
      }}>
        {children}
      </div>
    </div>
    {label && <div style={{ fontFamily: 'Caveat, cursive', fontSize: 13, color: '#888', fontStyle: 'italic' }}>📱 {label}</div>}
  </div>
);

// Mobile primitives — smaller scale
const MLine = ({ w = '100%', h = 6, style = {} }) => (
  <div style={{ width: w, height: h, background: '#bbb', borderRadius: 2, ...style }} />
);
const MBox = ({ children, style = {}, dashed }) => (
  <div style={{ border: `1.5px ${dashed ? 'dashed' : 'solid'} #555`, background: '#e8e5df', borderRadius: 2, ...style }}>{children}</div>
);
const MBtn = ({ label, filled, style = {} }) => (
  <div style={{
    border: '1.5px solid #444', background: filled ? '#444' : '#e0ddd7',
    color: filled ? '#f5f3ef' : '#222', borderRadius: 2,
    padding: '4px 8px', fontSize: 10, fontWeight: 700, fontFamily: 'Caveat, cursive',
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
    ...style
  }}>{label}</div>
);
const MImg = ({ h = 50, label = '[ img ]' }) => (
  <div style={{
    border: '1.5px solid #555', background: '#ddd', height: h, width: '100%',
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    fontSize: 9, color: '#888', fontFamily: 'Caveat, cursive', position: 'relative', overflow: 'hidden',
  }}>
    <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ position: 'absolute', width: '141%', height: 1.5, background: '#aaa', transform: 'rotate(30deg)' }}/>
      <div style={{ position: 'absolute', width: '141%', height: 1.5, background: '#aaa', transform: 'rotate(-30deg)' }}/>
    </div>
    <span style={{ background: '#ddd', padding: '0 3px', zIndex: 1 }}>{label}</span>
  </div>
);
const MNav = () => (
  <div style={{ background: '#e0ddd7', borderBottom: '1.5px solid #555', padding: '6px 8px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
    <div style={{ fontSize: 14, fontWeight: 700, color: '#222' }}>☰</div>
    <div style={{ background: '#ccc', padding: '2px 6px', fontSize: 10, fontWeight: 700, borderRadius: 1 }}>🎵 VinylSeeker</div>
  </div>
);
const MPill = ({ label, active }) => (
  <div style={{
    border: '1.5px solid #555', borderRadius: 10, padding: '0 6px',
    fontSize: 9, fontWeight: 600, fontFamily: 'Caveat, cursive',
    background: active ? '#444' : '#e8e5df', color: active ? '#f5f3ef' : '#333',
    display: 'inline-flex', whiteSpace: 'nowrap'
  }}>{label}</div>
);

// Broken vinyl placeholder — for error states
// In the design phase this becomes a real broken vinyl illustration
const BrokenVinyl = ({ size = 64 }) => (
  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
    <svg width={size} height={size} viewBox="0 0 64 64" style={{ display: 'block' }}>
      {/* Vinyl disc */}
      <circle cx="32" cy="32" r="30" fill="#d8d5cf" stroke="#555" strokeWidth="2"/>
      {/* Label circle */}
      <circle cx="32" cy="32" r="10" fill="#bbb" stroke="#555" strokeWidth="1.5"/>
      {/* Center hole */}
      <circle cx="32" cy="32" r="3" fill="#f5f3ef" stroke="#555" strokeWidth="1"/>
      {/* Grooves */}
      <circle cx="32" cy="32" r="20" fill="none" stroke="#aaa" strokeWidth="1" strokeDasharray="2 3"/>
      <circle cx="32" cy="32" r="15" fill="none" stroke="#aaa" strokeWidth="1" strokeDasharray="2 3"/>
      {/* Crack lines */}
      <line x1="14" y1="10" x2="38" y2="42" stroke="#555" strokeWidth="2.5" strokeLinecap="round"/>
      <line x1="38" y1="42" x2="50" y2="36" stroke="#555" strokeWidth="2" strokeLinecap="round"/>
      <line x1="38" y1="42" x2="34" y2="58" stroke="#555" strokeWidth="1.5" strokeLinecap="round"/>
      {/* Chip */}
      <polygon points="14,10 22,8 16,18" fill="#e8e5df" stroke="#555" strokeWidth="1.5"/>
    </svg>
    <div style={{ fontFamily: 'Caveat, cursive', fontSize: 10, color: '#888', fontStyle: 'italic', textAlign: 'center' }}>
      [ broken vinyl — ממחיש שגיאה ]
    </div>
  </div>
);

// ─── Shared Navbar ────────────────────────────────────────────────────────────

const NavbarLoggedOut = () => (
  <div className="wf-box" style={{ padding: '10px 16px', marginBottom: 0, borderBottom: '2px solid #555', background: '#e0ddd7' }}>
    <div className="flex items-center justify-between w100">
      <div className="flex items-center gap16">
        <Btn label="התחברות" ann="→ Login Page" />
        <Btn label="הרשמה חינם" type="filled" ann="→ Register Page" />
      </div>
      <div className="flex items-center gap24">
        <span style={{ fontSize: 14, color: '#555' }}>חיפוש</span>
        <span style={{ fontSize: 14, color: '#555' }}>מוכרים</span>
        <span style={{ fontSize: 14, color: '#555' }}>אודות</span>
        <div className="wf-box" style={{ padding: '4px 12px', background: '#ccc', fontFamily: 'Caveat, cursive', fontWeight: 700, fontSize: 16, color: '#222' }}>
          🎵 VinylSeeker
        </div>
      </div>
    </div>
    <AuthNote text="מצב מחובר: מציג אייקון Avatar + כפתור Wishlist במקום כפתורי כניסה/הרשמה" />
  </div>
);

const NavbarLoggedIn = () => (
  <div className="wf-box" style={{ padding: '10px 16px', marginBottom: 0, borderBottom: '2px solid #555', background: '#e0ddd7' }}>
    <div className="flex items-center justify-between w100">
      <div className="flex items-center gap16">
        <div className="flex items-center gap8">
          <Circle size={32} label="👤" />
          <div style={{ fontSize: 13, fontFamily: 'Caveat, cursive', color: '#555' }}>▾</div>
          <Ann text="→ Profile dropdown" style={{ fontSize: 11 }} />
        </div>
        <div className="flex items-center gap6">
          <div className="wf-btn outline" style={{ fontSize: 13 }}>♡ Wishlist <span style={{ background: '#444', color: '#f5f3ef', borderRadius: '50%', padding: '0 5px', fontSize: 11 }}>3</span></div>
          <Ann text="→ Wishlist Page" style={{ fontSize: 11 }} />
        </div>
      </div>
      <div className="flex items-center gap24">
        <span style={{ fontSize: 14, color: '#555' }}>חיפוש</span>
        <span style={{ fontSize: 14, color: '#555' }}>מוכרים</span>
        <span style={{ fontSize: 14, color: '#555' }}>אודות</span>
        <div className="wf-box" style={{ padding: '4px 12px', background: '#ccc', fontFamily: 'Caveat, cursive', fontWeight: 700, fontSize: 16, color: '#222' }}>
          🎵 VinylSeeker
        </div>
      </div>
    </div>
  </div>
);

// ─── SCREEN 1: Landing Page ───────────────────────────────────────────────────

const Screen1 = () => (
  <div>
    <div className="screen-badge"><span>מסך 1</span>דף הבית — ציבורי</div>
    <div className="access-badge">🔓 ציבורי — ללא התחברות</div>
    <div className="wf-canvas sketch-border" style={{ width: 1100, margin: '0 auto' }}>
      {/* Navbar */}
      <NavbarLoggedOut />

      {/* Hero */}
      <div style={{ padding: '40px 60px', background: '#eceae4', borderBottom: '2px solid #ccc', textAlign: 'right' }}>
        <div className="flex justify-center" style={{ marginBottom: 16 }}>
          <Pill label="✦ עכשיו עם מלאי חנויות ישראליות" />
        </div>
        <div style={{ textAlign: 'center', marginBottom: 20 }}>
          <div className="wf-line lg" style={{ width: '60%', margin: '0 auto 8px', height: 28 }} />
          <div className="wf-line lg" style={{ width: '45%', margin: '0 auto 16px', height: 28 }} />
          <Lines count={3} style={{ width: '50%', margin: '0 auto 24px' }} />
        </div>
        {/* Search bar */}
        <div className="flex items-center gap8 justify-center">
          <Btn label="חיפוש" type="filled" ann="→ Search Page עם תוצאות" />
          <div className="wf-input" style={{ width: 380, fontSize: 14, color: '#aaa' }}>חפש אמן, אלבום, קטלוג...</div>
        </div>
      </div>

      {/* Stats bar */}
      <div className="flex justify-center gap8" style={{ padding: '16px 60px', borderBottom: '2px solid #ccc', background: '#e8e5df' }}>
        {[['12,400+', 'תקליטים'], ['38', 'חנויות'], ['850+', 'מוכרים פרטיים']].map(([num, label], i) => (
          <div key={i} className="flex items-center gap8">
            {i > 0 && <div style={{ width: 1, height: 36, background: '#aaa' }} />}
            <div style={{ textAlign: 'center', fontFamily: 'Caveat, cursive' }}>
              <div style={{ fontSize: 22, fontWeight: 700, color: '#222' }}>{num}</div>
              <div style={{ fontSize: 13, color: '#666' }}>{label}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Features */}
      <div style={{ padding: '32px 60px', borderBottom: '2px solid #ccc' }}>
        <div className="flex gap20">
          {['חיפוש מאוחד', 'איסוף מקומי', 'התראות מחיר'].map((title, i) => (
            <div key={i} className="wf-box flex-col gap8" style={{ flex: 1, padding: 16, textAlign: 'center' }}>
              <Circle size={44} style={{ margin: '0 auto' }} />
              <div className="wf-line" style={{ width: '60%', margin: '0 auto', height: 14 }} />
              <Lines count={3} />
              <Ann text="לא ניתן ללחיצה" style={{ justifyContent: 'center', fontSize: 11 }} />
            </div>
          ))}
        </div>

                    <div style={{ width: 28, height: 28, borderRadius: '50%', background: '#ddd', border: '1.5px solid #555' }}/>
                    <span>{row[0]}</span>
                    <span style={{ color: '#666' }}>{row[1]}</span>
                    <Pill label={row[2]} sm />
                    <span style={{ color: '#666' }}>{row[3]}</span>
                    <Pill label={row[4]} active={row[4] === 'חסום'} sm />
                    <div className="flex gap4">
                      <div className="wf-btn outline" style={{ fontSize: 11, padding: '2px 6px' }}>צפה</div>
                      <div className="wf-btn outline" style={{ fontSize: 11, padding: '2px 6px' }}>חסום</div>
                      <div className="wf-btn outline" style={{ fontSize: 11, padding: '2px 6px' }}>...</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {tab === 'reports' && (
            <div className="flex-col gap10">
              {[
                { reporter: 'רינה לוי', target: 'מכירה: Miles Davis - Kind of Blue', reason: 'תיאור מטעה', status: 'פתוח', priority: 'גבוה' },
                { reporter: 'דני אבן', target: 'משתמש: spam@bad.com', reason: 'ספאם / הודעות לא רצויות', status: 'פתוח', priority: 'בינוני' },
                { reporter: 'יוסי כהן', target: 'מכירה: (אלבום מוסר)', reason: 'מצב התקליט שונה מהמתואר', status: 'בטיפול', priority: 'בינוני' },
              ].map((r, i) => (
                <div key={i} className="wf-box" style={{ padding: 12, borderRight: r.priority === 'גבוה' ? '4px solid #844' : '4px solid #888' }}>
                  <div className="flex items-center justify-between" style={{ marginBottom: 6 }}>
                    <div className="flex gap6 items-center">
                      <Pill label={`עדיפות: ${r.priority}`} active={r.priority === 'גבוה'} sm />
                      <Pill label={r.status} sm />
                    </div>
                    <div style={{ fontFamily: 'Caveat, cursive', fontSize: 12, color: '#888' }}>לפני 2 שעות</div>
                  </div>
                  <div style={{ fontFamily: 'Caveat, cursive', fontSize: 14, fontWeight: 700, marginBottom: 4 }}>{r.target}</div>
                  <div style={{ fontFamily: 'Caveat, cursive', fontSize: 13, color: '#444' }}>סיבה: {r.reason}</div>
                  <div style={{ fontFamily: 'Caveat, cursive', fontSize: 12, color: '#666', marginTop: 4 }}>דווח על ידי: {r.reporter}</div>
                  <div className="flex gap6" style={{ marginTop: 8 }}>
                    <Btn label="חקור" type="filled" ann="→ פותח את הפריט המדווח" />
                    <Btn label="פתור — תקין" type="outline" />
                    <Btn label="הסר את הפריט" type="outline" />
                    <Btn label="חסום משתמש" type="outline" />
                  </div>
                </div>
              ))}
            </div>
          )}

          {tab === 'stores' && (
            <div>
              <div className="flex items-center gap8" style={{ marginBottom: 12 }}>
                <div className="wf-input" style={{ flex: 1, color: '#aaa' }}>חפש חנות... 🔍</div>
                <Btn label="+ הוסף חנות חדשה" type="filled" />
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10 }}>
                {[
                  { name: 'רקורד תל אביב', city: 'תל אביב', items: 482, status: 'מאומת' },
                  { name: 'מוסיקה לכל', city: 'ירושלים', items: 215, status: 'מאומת' },
                  { name: 'Vinyl Heaven', city: 'חיפה', items: 138, status: 'בהמתנה' },
                  { name: 'הכל בויניל', city: 'פתח תקווה', items: 92, status: 'מאומת' },
                ].map((s, i) => (
                  <div key={i} className="wf-box" style={{ padding: 12 }}>
                    <div className="flex items-center justify-between" style={{ marginBottom: 6 }}>
                      <div style={{ fontFamily: 'Caveat, cursive', fontWeight: 700, fontSize: 15 }}>{s.name}</div>
                      <Pill label={s.status} active={s.status === 'בהמתנה'} sm />
                    </div>
                    <div style={{ fontFamily: 'Caveat, cursive', fontSize: 13, color: '#666' }}>{s.city} · {s.items} פריטים בקטלוג</div>
                    <div className="flex gap6" style={{ marginTop: 8 }}>
                      <Btn label="ערוך" type="outline" />
                      <Btn label="סנכרן מלאי" type="outline" ann="מושך מלאי מ-API של החנות" />
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
      <div style={{ display: 'flex', justifyContent: 'center', marginTop: 20, fontFamily: 'Caveat, cursive', fontSize: 13, color: '#888', fontStyle: 'italic' }}>
        📱 פאנל ניהול הוא Desktop-only — אין תצוגת מובייל
      </div>
    </div>
  );
};

// ─── App Shell ────────────────────────────────────────────────────────────────

const screens = [
  { id: 's1', label: 'דף הבית', component: Screen1 },
  { id: 's2', label: 'כניסה / הרשמה', component: Screen2 },
  { id: 's7', label: 'שכחתי סיסמה', component: Screen7 },
  { id: 's3', label: 'חיפוש', component: Screen3 },
  { id: 's4', label: 'דף מוצר', component: Screen4 },
  { id: 's5', label: 'העלאת מכירה', component: Screen5 },
  { id: 's6', label: 'Wishlist', component: Screen6 },
  { id: 's9', label: 'צ\'אט', component: Screen9 },
  { id: 's8', label: 'פרופיל / הגדרות', component: Screen8 },
  { id: 's10', label: '⚙ פאנל אדמין', component: Screen10 },
];

function App() {
  const [active, setActive] = React.useState('s1');
  return (
    <>
      <nav className="screen-nav">
        {screens.map(s => (
          <button key={s.id} className={active === s.id ? 'active' : ''} onClick={() => setActive(s.id)}>
            {s.label}
          </button>
        ))}
      </nav>
      <div className="screens-wrapper">
        {screens.map(s => (
          <div key={s.id} className={`screen-panel ${active === s.id ? 'active' : ''}`}>
            <s.component />
          </div>
        ))}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root') || (() => {
  const el = document.createElement('div');
  el.id = 'root';
  document.body.appendChild(el);
  return el;
})()).render(<App />);

</script>

<div id="root"></div>
